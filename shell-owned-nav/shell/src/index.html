<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MFE Demo</title>
    <style>
      /* Critical nav styles inlined to prevent FOUC */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f8fafc; }
      #root { min-height: 100vh; }
      .nav-shell {
        display: flex;
        align-items: center;
        gap: 0;
        background: #1e293b;
        padding: 0 1.5rem;
        height: 56px;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .nav-brand {
        font-weight: 700;
        font-size: 1.1rem;
        color: #f8fafc;
        margin-right: 2rem;
        letter-spacing: -0.01em;
      }
      .nav-link {
        color: #94a3b8;
        text-decoration: none;
        padding: 0 1rem;
        height: 56px;
        display: flex;
        align-items: center;
        font-size: 0.9rem;
        font-weight: 500;
        border-bottom: 2px solid transparent;
        transition: color 0.15s, border-color 0.15s;
      }
      .nav-link:hover { color: #f1f5f9; }
      .nav-link.active { color: #f1f5f9; border-bottom-color: #6366f1; }
    </style>
    <link rel="preload" href="http://localhost:3001/mf-manifest.json" as="fetch" crossorigin />
    <link rel="preload" href="http://localhost:3002/mf-manifest.json" as="fetch" crossorigin />
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
